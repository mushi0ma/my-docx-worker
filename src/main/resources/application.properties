# =============================================
# ???????? ?????????
# =============================================
spring.application.name=document-parser
server.port=8081

# =============================================
# ????????? ??????
# ??? ???? ??????????? ????? StorageConfig ? ???????? System.getenv()
# =============================================
app.storage.temp-path=${TEMP_DOCS_PATH:/tmp/docs}
app.storage.images-path=${IMAGE_STORAGE_PATH:/app/images}

# =============================================
# RABBITMQ
# =============================================
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:admin}
spring.rabbitmq.password=${RABBITMQ_PASS:admin123}

app.rabbitmq.queue=document.parse.queue
app.rabbitmq.exchange=document.exchange
app.rabbitmq.routingkey=document.routing.key

# =============================================
# REDIS
# =============================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
app.redis.result-ttl-seconds=${REDIS_TTL_SECONDS:86400}

# =============================================
# DATABASE (PostgreSQL + PgVector)
# =============================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/document_parser?prepareThreshold=0}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.datasource.hikari.max-lifetime=500000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# =============================================
# AI ? API ?????
# =============================================
groq.api.key=${GROQ_API_KEY:demo}
openrouter.api.key=${OPENROUTER_API_KEY:demo}

# =============================================
# AI ? ???????? ?? ???????????
# Groq (llama-4-scout): ???????, >460 ???????/???, ??? Summary
# OpenRouter (qwen3-*): ?????????, ??????? ????????, ??? RAG ? ?????????
# =============================================
app.ai.timeout.groq-seconds=20
app.ai.timeout.openrouter-seconds=90

# =============================================
# AI ? Summary (Llama 4 Scout / Groq)
# =============================================
# ~25000 ???????? ? 6000 ??????? ? ?????????? ??? ??????????? ??????????
app.ai.summary.max-chars=25000

# =============================================
# AI ? SSE ????????
# =============================================
# 120 ?????? ? ?????????? ??? ????? ??????? ????????? ???????
app.ai.sse.timeout-ms=120000

# =============================================
# AI ? RAG ??? (Qwen3 / OpenRouter)
# =============================================
app.ai.rag.max-results=5

# =============================================
# AI ? ????????????? (Qwen3 Coder / OpenRouter)
# =============================================
# ???? ???????? ?????? ? ????????? ???? ????????
app.ai.correction.max-json-chars=15000
# ???? >60% ????????? ?????? ?????? ? ???????? ????????? ?????????
app.ai.correction.max-empty-ratio=0.6
# ???????? LLM-??????? ??? ????????? ????????? (?????? ?? API-???????????)
app.ai.correction.max-block-corrections=50

# =============================================
# AI ? ?????
# =============================================
app.ai.agent.max-iterations=8

# =============================================
# ACTUATOR
# =============================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.health.rabbit.enabled=true
management.health.redis.enabled=true
management.health.db.enabled=true

# =============================================
# OPENAPI / SWAGGER
# =============================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.info.title=Document Parser API
springdoc.info.description=DOCX parsing, AI analysis and export microservice
springdoc.info.version=1.0.0

# =============================================
# TIMEZONE (Asia/Almaty UTC+5)
# =============================================
spring.jackson.time-zone=Asia/Almaty

# ??????? ????? ? MDC (jobId ????? ? ?????? ??????)
logging.pattern.console=%clr(%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX}){faint} %clr(%5p) %clr(${PID:- }){magenta} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %clr([%X{jobId}]){yellow} %m%n${LOG_EXCEPTION_CONVERSION_WORD:-%wEx}

# =============================================
# ?????? ???????? ??????
# =============================================
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB

# =============================================
# ??????? ??????
# =============================================
app.cleanup.max-age-hours=24
app.cleanup.interval-ms=3600000

# =======================================
# GOOGLE GEMINI (??????? ??????????)
# =======================================
google.gemini.api-key=${GEMINI_API_KEY:}